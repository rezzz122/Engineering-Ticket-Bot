name: Jira Digest

on:
  workflow_dispatch:        # triggered by cron-job.org or manually from GitHub UI

jobs:
  run-digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PYLON_API_KEY: ${{ secrets.PYLON_API_KEY }}
          PYLON_API_BASE_URL: ${{ secrets.PYLON_API_BASE_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -c "
          import asyncio, logging
          logging.basicConfig(level=logging.INFO, format='%(levelname)s: %(message)s')
          from app.database import init_db
          from app.digest_job import run_all_digests
          async def main():
              await init_db()
              await run_all_digests()
          asyncio.run(main())
          "
